name: Deploy Infra + App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Setup Java
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Build App
    - name: Build App
      working-directory: app
      run: mvn clean package

    # 4. Upload JAR
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: app/target/*.jar

    # 5. Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # 6. Configure AWS
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    # 7. Terraform Init
    - name: Terraform Init
      working-directory: terraform
      run: terraform init -reconfigure

    # 8. Terraform Apply
    - name: Terraform Apply
      working-directory: terraform
      run: terraform apply -auto-approve

    # 9. Get EC2 IP
    - name: Get EC2 IP
      working-directory: terraform
      run: echo "EC2_IP=$(terraform output -raw ec2_public_ip)" >> $GITHUB_ENV

    # 10. Download JAR
    - name: Download JAR
      uses: actions/download-artifact@v4
      with:
        name: app-jar

    # 11. Deploy to EC2 (FIXED KEY HANDLING)
    - name: Deploy to EC2
      run: |
        echo "${{ secrets.AJAYKEY_BASE64 }}" | base64 -d > ajay-new-key.pem
        chmod 600 ajay-new-key.pem

        scp -o StrictHostKeyChecking=no -i ajay-new-key.pem *.jar ubuntu@$EC2_IP:/home/ubuntu/app.jar

        ssh -o StrictHostKeyChecking=no -i ajay-new-key.pem ubuntu@$EC2_IP << EOF
          pkill java || true
          nohup java -jar /home/ubuntu/app.jar > app.log 2>&1 &
        EOF